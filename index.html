<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis recuerdos, mi vida, lo que fue mi felicidad</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000,#1a1a1a,#f7d6e6);
overflow:hidden;

}

.card{

width:90%;
max-width:420px;

background:rgba(255,255,255,.88);

backdrop-filter:blur(12px);

padding:35px;

border-radius:25px;

text-align:center;

box-shadow:0 0 40px rgba(255,192,203,.4);

animation:aparecer 1.5s;

}

h1{

font-family:"Playfair Display",serif;

color:#d63384;

font-size:34px;

margin-bottom:20px;

}

p{

margin-bottom:20px;

color:#333;

line-height:1.7;

}

input{

width:100%;

padding:15px;

border-radius:12px;

border:none;

background:#f3f3f3;

font-size:18px;

text-align:center;

margin-bottom:20px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:18px;

cursor:pointer;

background:#ff5f9e;

color:white;

transition:.3s;

}

button:hover{

background:#e54586;

}

#mensaje{

margin-top:20px;

font-weight:bold;

color:#d63384;

}

@keyframes aparecer{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.corazon{

position:absolute;

color:pink;

animation:caer linear infinite;

}

@keyframes caer{

0%{

transform:translateY(-100px);

opacity:1;

}

100%{

transform:translateY(120vh);

opacity:0;

}

}

</style>

</head>

<body>

<div class="card">

<h1>❤️</h1>

<h2>Mis recuerdos,<br>mi vida,<br>lo que fue mi felicidad</h2>

<br>

<p>

Hola Diana...

<br><br>

Si estás aquí es porque recuerdas una fecha que para mí cambió todo.

<br><br>

Introduce esa fecha importante.

</p>

<input
type="text"
id="fecha"
placeholder="19/09/2024">

<button onclick="entrar()">

Abrir nuestros recuerdos

</button>

<div id="mensaje"></div>

</div>

<script>

function entrar(){

let fecha=document.getElementById("fecha").value;

if(fecha==="19/09/2024"){

window.location.href="galeria.html";

}else{

document.getElementById("mensaje").innerHTML="💔 Esa no es la fecha... inténtalo otra vez.";

}

}

for(let i=0;i<40;i++){

let c=document.createElement("div");

c.innerHTML="❤";

c.className="corazon";

c.style.left=Math.random()*100+"vw";

c.style.animationDuration=(4+Math.random()*6)+"s";

c.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(c);

}

</script>

</body>
</html>
